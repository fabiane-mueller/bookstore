<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/books.css">
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <header>
        <div class="content">
            <div class="logo">
                <img src="assets/icons/colibri-artworks-logo.png" alt="Logo Colibri Artworks">
            </div>
            <nav>

            </nav>
        </div>
    </header>
    <main>
        <div class="content">
            <section id="book" class="book-box">
                <h2 id="book-title">Fantasiereisen für Kinder</h2>
                <section id="book-img" class="book-imagebox">
                    <img src="assets/img/cover-traumreisen.png" alt="Cover Traumreisen für Kinder">
                    <section class="price-badge" id="price">
                        12,90 €
                    </section>
                </section>
                <section id="book-details" class="details-box">
                    <div class="detail-element-box">
                        <p id="detail-key" class="d-key"><strong>Autor</strong></p>
                        <p id="detail-value" class="d-value">Fabiane Müller</p>
                    </div>
                    
                    <section id="likes" class="like-box">
                        
                        <div id="like-heart" class="heart">
                            <button><img src="assets/icons/icon-like.png"</button>
                        </div>
                        <p>123</p>
                    </section>
                </section>
                <section id="book-comments" class="comments-box">
                    <h3>Kommentare</h3>
                    <section id="comment" class="comment-item">
                        <p id="comment-key" class="c-key">[Kevin]</p>
                        <p id="comment-value" class="c-value">Meine Kinder lieben es</p>
                    </section>
                    <div id="add-comment" class="add-comment-box">
                        <input type="text" placeholder="Schreibe dein Kommentar ...">
                        <img src="assets/icons/icon-senden.png">
                    </div>
                </section>
            </section>
        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
