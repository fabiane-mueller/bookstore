<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/components.css">
    <script src="scripts/script.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/icons/colibri-artworks-logo.png" alt="Logo Colibri Artworks">
        </div>
        <nav>

        </nav>
    </header>
    <main>

        <section id="book" class="book-box">
            <h2 id="book-title">Fantasiereisen für Kinder</h2>
            <section id="book-img" class="book-imagebox">
                <img src="assets/img/cover-traumreisen.png" alt="Cover Traumreisen für Kinder">
                <section class="price-badge" id="price">
                    12,90 €
                </section>
            </section>
            <section id="book-details" class="details-box">
                <table>
                    <tr>
                        <td>Autor</td>
                        <td>Fabiane Müller</td>
                    </tr>
                    <tr>
                        <td>Erscheinungsjahr</td>
                        <td>2024</td>
                    </tr>
                    <tr>
                        <td>Genre</td>
                        <td>Kinderbuch</td>
                    </tr>
                </table>
                <aside id="likes" class="like-box">
                    <p>123</p>
                    <div id="like-heart" class="heart">

                    </div>
                </aside>
            </section>
            <section id="book-comments" class="comments-box">
                <h3>Kommentare</h3>
                <section id="comment" class="comment-item">
                    <table>
                        <tr>
                            <td>[Kevin]</td>
                            <td>Meine Kinder lieben es</td>
                        </tr>
                    </table>
                </section>
                <div id="add-comment" class="add-comment-box">
                    <input type="text" placeholder="Schreibe dein Kommentar ...">
                    <img src="assets/icons/icon-senden.png">
                </div>
            </section>
        </section>

    </main>
    <footer>

    </footer>
</body>
</html>
